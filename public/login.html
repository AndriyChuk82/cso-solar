<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSO Solar — Вхід</title>
    <meta name="description" content="Авторизація в системі комерційних пропозицій CSO Solar">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="image/png" href="https://i.ibb.co/32JD4dc/logo.png">
</head>
<body>
    <div class="login-bg">
        <div class="sun-glow"></div>
        <div class="grid-pattern"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="https://i.ibb.co/32JD4dc/logo.png" alt="CSO Solar" class="login-logo-img">
            </div>
            <h1 class="login-title">CSO Solar</h1>
            <p class="login-subtitle">Система комерційних пропозицій</p>

            <form id="loginForm" class="login-form" autocomplete="off">
                <div class="form-field">
                    <label for="loginUsername">
                        <span class="field-icon">👤</span>
                        Логін
                    </label>
                    <input 
                        type="text" 
                        id="loginUsername" 
                        name="username"
                        required 
                        autocomplete="username" 
                        placeholder="Введіть логін"
                        maxlength="100"
                    >
                </div>
                <div class="form-field">
                    <label for="loginPassword">
                        <span class="field-icon">🔒</span>
                        Пароль
                    </label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        name="password"
                        required 
                        autocomplete="current-password" 
                        placeholder="Введіть пароль"
                        maxlength="200"
                    >
                </div>

                <div id="loginError" class="login-error" style="display:none;"></div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Увійти</span>
                    <span class="btn-spinner" style="display:none;"></span>
                </button>
            </form>

            <div class="login-footer">
                <p>🔐 Захищене з'єднання</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');
        const btnText = btn.querySelector('.btn-text');
        const btnSpinner = btn.querySelector('.btn-spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            errorDiv.style.display = 'none';
            btn.disabled = true;
            btnText.textContent = 'Перевірка...';
            btnSpinner.style.display = 'inline-block';

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await resp.json();

                if (resp.ok && data.success) {
                    btnText.textContent = '✅ Успіх!';
                    setTimeout(() => {
                        window.location.href = data.redirect || '/';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Невірний логін або пароль';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btnText.textContent = 'Увійти';
                    btnSpinner.style.display = 'none';
                    
                    // Shake animation
                    form.classList.add('shake');
                    setTimeout(() => form.classList.remove('shake'), 600);
                }
            } catch (err) {
                errorDiv.textContent = 'Помилка з\'єднання з сервером';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btnText.textContent = 'Увійти';
                btnSpinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
