<!-- Побудовано CSO Solar -->
<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зелений тариф — Друк документів</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/32JD4dc/logo.png">
    <style>
        @page {
            size: A4 portrait;
            margin: 0;
            /* Вимикаємо поля браузера, щоб контролювати їх лише через CSS */
        }

        body {
            font-family: "Times New Roman", Times, serif;
            font-size: 11pt;
            line-height: 1.35;
            color: #000;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .no-print {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .btn-print {
            background: #2563eb;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-size: 16px;
        }

        .btn-print:hover {
            background: #1d4ed8;
        }

        .print-container {
            width: 210mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .doc-wrapper {
            background: white;
            padding: 15mm 15mm;
            /* Стандартні поля документів */
            box-sizing: border-box;
            page-break-after: always;
            position: relative;
            width: 210mm;
            min-height: 297mm;
        }

        .doc-wrapper:last-child {
            page-break-after: avoid;
        }

        .error-state {
            padding: 40px;
            text-align: center;
            color: #ef4444;
            font-size: 16px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .print-container {
                width: 210mm;
                box-shadow: none;
                margin: 0;
            }

            .doc-wrapper {
                padding: 15mm 15mm;
                margin: 0;
                width: 210mm;
                min-height: 297mm;
            }
        }
    </style>
</head>

<body>

    <div class="no-print">
        <button class="btn-print" onclick="window.print()">🖨️ ДРУКУВАТИ / ЗБЕРЕГТИ PDF</button>
        <button class="btn-print" style="background: #ef4444;" onclick="window.close()">✕ Закрити</button>
    </div>

    <div class="print-container" id="printContainer">
        <div class="error-state" id="loadingState">Завантаження документів...</div>
    </div>

    <script src="green-tariff-templates.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // Читаємо унікальний ключ з URL (?key=gt_print_1234567890)
            const printKey = new URLSearchParams(location.search).get('key');

            if (!printKey) {
                showError('Ключ даних не знайдено в URL. Закрийте цю вкладку і спробуйте ще раз.');
                return;
            }

            const dataStr = localStorage.getItem(printKey);

            // Одразу видаляємо дані з localStorage — вони більше не потрібні.
            // Це важливо: фото в base64 можуть займати 2-4MB,
            // і якщо не прибирати — localStorage швидко заповниться.
            localStorage.removeItem(printKey);

            if (!dataStr) {
                showError('Дані для друку не знайдені або вже були використані. Закрийте цю вкладку і сформуйте документи ще раз.');
                return;
            }

            let printData;
            try {
                printData = JSON.parse(dataStr);
            } catch (e) {
                showError('Помилка читання даних: ' + e.message);
                return;
            }

            const { selected, formData, photos } = printData;
            const container = document.getElementById('printContainer');

            // Очищаємо повідомлення про завантаження
            container.innerHTML = '';

            // Ін'єктуємо стилі з GT_TEMPLATES в <head>.
            // <style> всередині div ігнорується браузером — тому в head.
            if (typeof GT_TEMPLATES !== 'undefined' && GT_TEMPLATES.styles) {
                const styleTag = document.createElement('style');
                styleTag.textContent = GT_TEMPLATES.styles.replace(/<\/?style[^>]*>/gi, '').trim();
                document.head.appendChild(styleTag);
            }

            // Рендеримо документи
            let renderedCount = 0;

            selected.forEach((docId) => {
                if (typeof GT_TEMPLATES === 'undefined') return;

                const templateKey = `doc${docId}`;
                let template = GT_TEMPLATES[templateKey];
                if (!template) {
                    console.warn(`⚠️ Шаблон "${templateKey}" не знайдено`);
                    return;
                }

                // Видаляємо плейсхолдер стилів — вони вже в <head>
                template = template.replace(/{{styles}}/g, '');

                // Підставляємо значення полів форми
                for (const [key, value] of Object.entries(formData)) {
                    const ph = `{{${key}}}`;
                    if (template.includes(ph)) {
                        template = template.split(ph).join(value || '__________');
                    }
                }

                // Логіка підпису та печатки (Окремо для кожної сторінки)
                const signBase = 'position:absolute; width:180px; z-index:10; pointer-events:none; mix-blend-mode: multiply; opacity: 0.94;';

                const signatureTitleHtml = formData.useSign
                    ? `<img src="/doc/sign_cso.png" style="${signBase} left:-10px; top:-60px;">`
                    : '';
                const signatureApp1Html = formData.useSign
                    ? `<img src="/doc/sign_cso.png" style="${signBase} right:70px; top:-20px;">`
                    : '';

                template = template.split('{{signature_title}}').join(signatureTitleHtml);
                template = template.split('{{signature_app1}}').join(signatureApp1Html);

                // Специфічна логіка для Однолінійної схеми (doc3)
                if (docId === '3') {
                    const hasBattery = formData.stationType && formData.stationType.toLowerCase().includes('гібрид');
                    template = template
                        .split("{{stationType === 'Гібридна' ? 'block' : 'none'}}").join(hasBattery ? 'block' : 'none')
                        .split("{{stationType === 'Гібридна' ? 'none' : 'block'}}").join(hasBattery ? 'none' : 'block');
                }

                // Перед заміною основних полів, підготуємо "під-поля" для дат та сум
                formData.field10_day = '___';
                formData.field10_month = '____________';
                formData.field10_year = '20___';
                if (formData.field10) {
                    const d = formData.field10.split('-');
                    if (d.length === 3) {
                        formData.field10_day = d[2];
                        formData.field10_month = d[1];
                        formData.field10_year = d[0];
                    }
                }

                formData.field38_int = '_________';
                formData.field38_kop = '00';
                if (formData.field38) {
                    const cleanVal = formData.field38.toString().replace(/\s/g, '').replace(',', '.');
                    const val = parseFloat(cleanVal) || 0;
                    if (val > 0) {
                        formData.field38_int = Math.floor(val).toLocaleString('uk-UA');
                        formData.field38_kop = '00';
                    }
                }

                // Специфічна логіка для Акту (doc4)
                if (docId === '4') {
                    const batteryInfo = formData.field36
                        ? `<li>Акумуляторна батарея: ${formData.field36} (${formData.field37} кВт*год)</li>`
                        : '';
                    template = template.split('{{batteryListItem}}').join(batteryInfo);
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'doc-wrapper';

                // Специфічна логіка для фото (Додаток 1 та 2)
                if (docId === '2') {
                    template = template.split('{{photo1}}').join(
                        photos.photo1
                            ? `<img src="${photos.photo1}" style="height:100%; width:auto; max-width:100%; object-fit:contain;">`
                            : '<span style="display:block; text-align:center; padding:20px; border:1px dashed #ccc;">(Фото 1: Інвертор)</span>'
                    );
                    template = template.split('{{photo2}}').join(
                        photos.photo2
                            ? `<img src="${photos.photo2}" style="height:100%; width:auto; max-width:100%; object-fit:contain;">`
                            : '<span style="display:block; text-align:center; padding:20px; border:1px dashed #ccc;">(Фото 2: С/н інвертора)</span>'
                    );
                }

                // Додаток №2: Скріншот налаштувань інвертора
                if (template.includes('{{photo_inverter_settings}}')) {
                    template = template.split('{{photo_inverter_settings}}').join(
                        photos.photo3
                            ? `<img src="${photos.photo3}" style="max-width:100%; max-height:280px; object-fit:contain;">`
                            : `<img src="/doc/foto_1_nastrojka.png" style="max-width:100%; max-height:280px; object-fit:contain;">`
                    );
                }



                wrapper.innerHTML = template;
                container.appendChild(wrapper);
                renderedCount++;
            });

            if (renderedCount === 0) {
                showError('Жодного документа не вдалося відрендерити. Перевірте шаблони.');
            } else {
                console.log(`✅ Відрендеровано ${renderedCount} документів`);
            }
        });

        function showError(msg) {
            const container = document.getElementById('printContainer');
            container.innerHTML = `<div class="error-state">❌ ${msg}</div>`;
        }
    </script>
</body>

</html>
